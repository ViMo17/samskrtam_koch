<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Санскрит: Учебный комплекс (Кочергина)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #ecf0f1; --correct: #27ae60; --border: #bdc3c7; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 0; font-size: 15px; padding-bottom: 50px; }
        .sanskrit { font-family: "Sanskrit Text", "Mangal", "Arial Unicode MS", sans-serif; font-weight: bold; color: #2980b9; font-size: 1.2em;}
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        nav { background: #34495e; padding: 10px; position: sticky; top: 0; z-index: 1000; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .nav-btn { background: #2c3e50; color: white; border: 1px solid #7f8c8d; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: #3498db; }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .step-section { display: none; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .step-section.active { display: block; }

        /* Таблицы и Дропзоны */
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: left; }
        .dropzone { width: 110px; height: 35px; background: #fafafa; border: 2px dashed #bdc3c7; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; border-radius: 4px; }
        .success-zone { border-color: var(--correct); background: #e8f8f5; border-style: solid; }
        .error-zone { border-color: var(--accent); background: #fdedec; border-style: solid; }
        
        /* Слитное написание сандхи */
        .sandhi-row-tight { display: flex; justify-content: center; gap: 0; margin-top: 10px; }
        .sandhi-row-tight .dropzone { border-radius: 0; margin: 0; border-right-width: 1px; width: 90px; }
        .sandhi-row-tight .dropzone:first-child { border-radius: 4px 0 0 4px; }
        .sandhi-row-tight .dropzone:last-child { border-radius: 0 4px 4px 0; border-right-width: 2px; }

        .pool-wrapper { background: #f9f9f9; padding: 15px; border: 1px dashed #aaa; border-radius: 6px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; min-height: 50px; }
        .draggable { background: var(--primary); color: white; padding: 6px 12px; border-radius: 4px; cursor: grab; font-weight: bold; user-select: none; }
        .draggable.locked { background: var(--correct); pointer-events: none; }

        .action-btns { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-check { background: var(--correct); }
        .btn-ans { background: #95a5a6; }
        .btn-reset { background: #7f8c8d; }

        /* Специфичные сетки */
        .vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .quiz-card { background: #fdfdfd; border: 1px solid var(--border); border-radius: 6px; padding: 15px; text-align: center; }
        .options-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .opt-btn { background: white; border: 2px solid var(--border); padding: 8px; border-radius: 4px; cursor: pointer; }
        .opt-btn.correct { background: var(--correct); color: white; border-color: #219a52; }
        .opt-btn.wrong { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><div>Синхронизация данных...</div></div>

    <nav id="navbar" style="display:none;">
        <button class="nav-btn active" onclick="navTo('theory')">Теория (Оптатив)</button>
        <button class="nav-btn" onclick="navTo('decl')">Склонения (ī, ū)</button>
        <button class="nav-btn" onclick="navTo('fem')">Женский род</button>
        <button class="nav-btn" onclick="navTo('vocab')">Словарь</button>
        <button class="nav-btn" onclick="navTo('sandhi-ca')">Сандхи 'ca'</button>
        <button class="nav-btn" onclick="navTo('two-stage')">Разбор текстов</button>
    </nav>

    <div class="container" id="main-container" style="display:none;">
        
        <div id="theory" class="step-section active">
            <h2>Оптатив (Желательное наклонение)</h2>
            <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
                <label><input type="radio" name="optLvl" value="1" checked onchange="switchOptLvl()"> Уровень 1</label>
                <label><input type="radio" name="optLvl" value="2" onchange="switchOptLvl()"> Уровень 2</label>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div id="likh-box">
                    <table id="tableLikh">
                        <tr><th colspan="4">likh (Parasmaipada)</th></tr>
                        <tr><td>1 л.</td><td><div class="dropzone" data-ans="likheyam"></div></td><td><div class="dropzone" data-ans="likheva"></div></td><td><div class="dropzone" data-ans="likhema"></div></td></tr>
                        <tr><td>2 л.</td><td><div class="dropzone" data-ans="likhes"></div></td><td><div class="dropzone" data-ans="likhetam"></div></td><td><div class="dropzone" data-ans="likheta"></div></td></tr>
                        <tr><td>3 л.</td><td><div class="dropzone" data-ans="likhet"></div></td><td><div class="dropzone" data-ans="likhetām"></div></td><td><div class="dropzone" data-ans="likheyur"></div></td></tr>
                    </table>
                    <div class="pool-wrapper" id="poolLikh"></div>
                </div>
                <div id="bhas-box">
                    <table id="tableBhas">
                        <tr><th colspan="4">bhāṣ (Ātmanepada)</th></tr>
                        <tr><td>1 л.</td><td><div class="dropzone" data-ans="bhāṣeya"></div></td><td><div class="dropzone" data-ans="bhāṣevahi"></div></td><td><div class="dropzone" data-ans="bhāṣemahi"></div></td></tr>
                        <tr><td>2 л.</td><td><div class="dropzone" data-ans="bhāṣethās"></div></td><td><div class="dropzone" data-ans="bhāṣeyāthām"></div></td><td><div class="dropzone" data-ans="bhāṣedhvam"></div></td></tr>
                        <tr><td>3 л.</td><td><div class="dropzone" data-ans="bhāṣeta"></div></td><td><div class="dropzone" data-ans="bhāṣeyātām"></div></td><td><div class="dropzone" data-ans="bhāṣeran"></div></td></tr>
                    </table>
                    <div class="pool-wrapper" id="poolBhas"></div>
                </div>
            </div>
            <div class="action-btns">
                <button class="btn btn-check" onclick="checkTable('theory')">Проверить</button>
                <button class="btn btn-reset" onclick="resetSection('theory')">Сброс</button>
            </div>
        </div>

        <div id="decl" class="step-section">
            <h2>Склонения основ на -ī и -ū</h2>
            <div id="decl-nadi">
                <h3 class="sanskrit">nadī (नदी) f - река</h3>
                <table style="max-width:600px; margin: 0 auto;">
                    <tr><td>N.sg</td><td><div class="dropzone" data-ans="nadī"></div></td><td>V.sg</td><td><div class="dropzone" data-ans="nadi"></div></td></tr>
                    <tr><td>A.sg</td><td><div class="dropzone" data-ans="nadīm"></div></td><td>I.sg</td><td><div class="dropzone" data-ans="nadyā"></div></td></tr>
                    <tr><td>D.sg</td><td><div class="dropzone" data-ans="nadyai"></div></td><td>L.sg</td><td><div class="dropzone" data-ans="nadyām"></div></td></tr>
                    <tr><td>N.V.pl</td><td><div class="dropzone" data-ans="nadyas"></div></td><td>A.pl</td><td><div class="dropzone" data-ans="nadīs"></div></td></tr>
